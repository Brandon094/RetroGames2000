<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Fondo Negro -->
  <rect width="32" height="32" rx="6" fill="#000"/>
  <!-- Pixel de Neón -->
  <rect x="8" y="8" width="16" height="16" fill="none" stroke="#00ffff" stroke-width="2" filter="url(#glow)" rx="2"/>
  <rect x="12" y="12" width="8" height="8" fill="#00ffff" filter="url(#glow)"/>
</svg>
